<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abraham App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header>
      <h1>Abraham</h1>
      <p>Prueba de app en GitHub</p>
    </header>

    <section class="card">
      <h2>Contador</h2>
      <p id="count" class="count">0</p>
      <div class="actions">
        <button id="decrease" type="button">-</button>
        <button id="reset" type="button">Reset</button>
        <button id="increase" type="button">+</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
