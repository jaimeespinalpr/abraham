<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abraham | English 12 Interactive Exam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="ambient ambient-a" aria-hidden="true"></div>
  <div class="ambient ambient-b" aria-hidden="true"></div>

  <main class="shell">
    <header class="hero">
      <p class="eyebrow">English 12 - Unit 12.3</p>
      <h1>Interactive Review Exam</h1>
      <p class="subtitle">Biography, Memoir, and Personal Narrative</p>
    </header>

    <section id="start-screen" class="panel">
      <label for="student-name">Student name</label>
      <div class="start-row">
        <input
          id="student-name"
          type="text"
          placeholder="Write your name"
          maxlength="60"
          autocomplete="name"
        />
        <button id="start-btn" type="button">Start Exam</button>
      </div>
      <p class="meta">18 questions, auto grading, and 20-minute timer.</p>
    </section>

    <section id="quiz-screen" class="panel hidden">
      <div class="status-grid">
        <div class="status-block">
          <span class="status-label">Student</span>
          <strong id="student-label">-</strong>
        </div>
        <div class="status-block">
          <span class="status-label">Question</span>
          <strong id="progress-label">1 / 18</strong>
        </div>
        <div class="status-block">
          <span class="status-label">Time left</span>
          <strong id="timer-label">20:00</strong>
        </div>
      </div>

      <div class="progress-track" aria-hidden="true">
        <div id="progress-fill" class="progress-fill"></div>
      </div>

      <article class="question-card">
        <p id="question-section" class="question-section">Part A</p>
        <h2 id="question-text"></h2>
        <div id="options" class="options" role="group" aria-label="Answer choices"></div>
      </article>

      <div class="nav-row">
        <button id="prev-btn" class="ghost" type="button">Previous</button>
        <button id="next-btn" type="button">Next</button>
      </div>
    </section>

    <section id="result-screen" class="panel hidden">
      <h2>Results</h2>
      <p id="score-line" class="result-line"></p>
      <p id="scaled-line" class="result-line"></p>
      <p id="message-line" class="result-line"></p>
      <div class="nav-row">
        <button id="retry-btn" type="button">Try Again</button>
      </div>
      <div id="review-list" class="review-list"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
